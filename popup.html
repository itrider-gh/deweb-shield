<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeWeb Shield</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        background: #ffffff;
        color: #172026;
        margin: 0;
        width: 380px;
      }

      .topbar {
        align-items: flex-start;
        background: #101820;
        color: #ffffff;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        padding: 18px;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 10px;
        min-width: 0;
      }

      .brand img {
        flex: 0 0 auto;
        height: 34px;
        width: 34px;
      }

      h1, h2, p { margin: 0; }
      h1 { font-size: 20px; line-height: 1.2; }
      h2 { font-size: 14px; line-height: 1.2; }

      .topbar p {
        color: #c8d2dc;
        font-size: 12px;
        margin-top: 4px;
        overflow-wrap: anywhere;
      }

      .badge {
        border-radius: 999px;
        flex: 0 0 auto;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 8px;
      }

      .verified { background: #ccebd7; color: #075a27; }
      .modified { background: #ffd4cf; color: #8a1f11; }
      .checking, .unknown, .neutral { background: #e3e8ef; color: #354456; }

      main { padding: 16px; }

      .status-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }

      .status-grid article {
        border: 1px solid #d8dee7;
        border-radius: 8px;
        min-height: 74px;
        padding: 10px;
      }

      .status-grid span {
        color: #617081;
        display: block;
        font-size: 11px;
      }

      .status-grid strong {
        display: block;
        font-size: 13px;
        line-height: 1.25;
        margin-top: 8px;
        overflow-wrap: anywhere;
      }

      .detail {
        border-top: 1px solid #e5e9f0;
        margin-top: 14px;
        padding-top: 14px;
      }

      .detail p {
        color: #526173;
        font-size: 13px;
        line-height: 1.4;
        margin-top: 6px;
      }

      .diff {
        border-top: 1px solid #e5e9f0;
        display: none;
        margin-top: 12px;
        padding-top: 12px;
      }

      .diff dl {
        display: grid;
        gap: 6px;
        grid-template-columns: 86px 1fr;
        margin: 8px 0;
      }

      .diff dt {
        color: #617081;
        font-size: 11px;
        font-weight: 700;
      }

      .diff dd {
        font-size: 12px;
        margin: 0;
        overflow-wrap: anywhere;
      }

      .diff pre {
        background: #f3f5f8;
        border-radius: 8px;
        font-size: 11px;
        line-height: 1.35;
        margin: 8px 0 0;
        max-height: 110px;
        overflow: auto;
        padding: 8px;
        white-space: pre-wrap;
      }

      .progress-wrap {
        display: none;
        margin-top: 10px;
      }

      .progress-track {
        background: #e5e9f0;
        border-radius: 999px;
        height: 8px;
        overflow: hidden;
      }

      .progress-bar {
        background: #143c5a;
        height: 100%;
        transition: width 160ms ease;
        width: 0%;
      }

      .progress-label {
        color: #526173;
        font-size: 12px;
        margin-top: 6px;
        overflow-wrap: anywhere;
      }

      ul {
        list-style: none;
        margin: 10px 0 0;
        padding: 0;
      }

      li {
        border-top: 1px solid #eef1f5;
        display: grid;
        gap: 4px;
        padding: 8px 0;
      }

      li span {
        color: #7a8795;
        font-size: 11px;
        text-transform: uppercase;
      }

      li strong {
        color: #1f2d3a;
        font-size: 12px;
        font-weight: 600;
        overflow-wrap: anywhere;
      }

      footer {
        display: flex;
        gap: 8px;
        justify-content: space-between;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #143c5a;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        min-height: 38px;
        padding: 0 14px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="icons/deweb-shield-48.png" alt="">
        <div>
          <h1>DeWeb Shield</h1>
          <p id="site">Site: unknown</p>
        </div>
      </div>
      <span id="badge" class="badge neutral">Unknown</span>
    </header>

    <main>
      <section class="status-grid">
        <article><span>Provider</span><strong id="provider">unknown</strong></article>
        <article><span>Provider trust</span><strong id="provider-trust">Unknown</strong></article>
        <article><span>Trusted node</span><strong id="trusted-node">127.0.0.1</strong></article>
        <article><span>Integrity</span><strong id="integrity">Unknown</strong></article>
        <article><span>External links</span><strong id="external">0 in code</strong></article>
        <article><span>CSP</span><strong id="csp">Unknown</strong></article>
      </section>

      <section class="detail">
        <h2>Code links</h2>
        <p id="detail">Waiting for a DeWeb page.</p>
        <p id="reason"></p>
        <p id="injection"></p>
        <p id="files"></p>
        <div id="progress" class="progress-wrap">
          <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
          <div id="progress-label" class="progress-label"></div>
        </div>
        <div id="diff" class="diff">
          <h2>Integrity Diff</h2>
          <dl>
            <dt>Offset</dt><dd id="diff-offset"></dd>
            <dt>Provider</dt><dd id="diff-provider"></dd>
            <dt>On-chain</dt><dd id="diff-onchain"></dd>
          </dl>
          <pre id="diff-provider-snippet"></pre>
          <pre id="diff-onchain-snippet"></pre>
        </div>
        <ul id="calls"></ul>
      </section>

      <footer>
        <button id="recheck" type="button">Recheck integrity</button>
        <button id="whitelist" type="button">Trust this site</button>
        <button id="options" type="button">Settings</button>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
